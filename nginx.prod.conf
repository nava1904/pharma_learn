# PharmaLearn NGINX Production Configuration
# Reverse proxy for API server with security hardening

# ─────────────────────────────────────────────────────────────────────────────
# Main Configuration
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─────────────────────────────────────────────────────────────────────────
    # Logging
    # ─────────────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent",'
        '"x_request_id":"$http_x_request_id"'
    '}';

    access_log /var/log/nginx/access.log json;

    # ─────────────────────────────────────────────────────────────────────────
    # Performance
    # ─────────────────────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/xml application/xml+rss text/javascript;

    # ─────────────────────────────────────────────────────────────────────────
    # Security Headers
    # ─────────────────────────────────────────────────────────────────────────
    server_tokens off;
    
    # Hide nginx version
    more_clear_headers Server;

    # ─────────────────────────────────────────────────────────────────────────
    # Upstream Servers
    # ─────────────────────────────────────────────────────────────────────────
    upstream pharma_api {
        server pharma_api:8080;
        keepalive 32;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Rate Limiting
    # ─────────────────────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─────────────────────────────────────────────────────────────────────────
    # HTTP → HTTPS Redirect
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name app.pharmalearn.internal;
        
        # Health check endpoint (no redirect)
        location /health {
            proxy_pass http://pharma_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # HTTPS Server
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name app.pharmalearn.internal;

        # ─────────────────────────────────────────────────────────────────────
        # SSL Configuration (21 CFR Part 11 compliant)
        # ─────────────────────────────────────────────────────────────────────
        ssl_certificate /etc/nginx/ssl/pharmalearn.crt;
        ssl_certificate_key /etc/nginx/ssl/pharmalearn.key;
        
        # TLS 1.2 and 1.3 only (FIPS 140-2 compliant)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        
        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ─────────────────────────────────────────────────────────────────────
        # Security Headers
        # ─────────────────────────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

        # ─────────────────────────────────────────────────────────────────────
        # Request Size Limits
        # ─────────────────────────────────────────────────────────────────────
        client_max_body_size 50M;  # For SCORM package uploads
        client_body_timeout 60s;
        client_header_timeout 60s;

        # ─────────────────────────────────────────────────────────────────────
        # API Routes
        # ─────────────────────────────────────────────────────────────────────
        
        # Health endpoint (public, no rate limit)
        location /health {
            proxy_pass http://pharma_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Detailed health (internal only)
        location /health/detailed {
            proxy_pass http://pharma_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Metrics endpoint (DENY - internal Prometheus only)
        location /metrics {
            deny all;
            return 403;
        }

        # Auth endpoints (stricter rate limit)
        location ~ ^/v1/auth/(login|refresh|password) {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_conn conn_limit 10;
            
            proxy_pass http://pharma_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # All v1 API routes
        location /v1/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 50;
            
            proxy_pass http://pharma_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            
            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # SCORM content (longer timeouts for package uploads)
        location ~ ^/v1/create/scorm {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://pharma_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Extended timeouts for large uploads
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            client_max_body_size 100M;
        }

        # Default: 404
        location / {
            return 404 '{"error": "Not Found"}';
            add_header Content-Type application/json;
        }
    }
}
